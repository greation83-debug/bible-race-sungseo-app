            const dateToOffset = (month, day) => {

                let offset = 0;
                for (let i = 0; i < month - 1; i++) {
                    offset += daysInMonth[i];
                }
                offset += day - 1;
                return offset;
            };

            const offsetToDateStr = (offset) => {
                const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                let remaining = offset;
                let month = 0;
                while (remaining >= daysInMonth[month]) {
                    remaining -= daysInMonth[month];
                    month++;
                }
                return `${month + 1}월 ${remaining + 1}일`;
            };

            // Supabase URL들
            const SUPABASE_BULK_URL = SUPABASE_FUNCTION_URL.replace('notion-proxy', 'notion-proxy-bulk');
            const SUPABASE_PAGE_URL = SUPABASE_FUNCTION_URL.replace('notion-proxy', 'notion-proxy-page');
            
            // 관리자용: 노션 → Firestore 동기화 (Bulk 방식)
            const syncNotionToFirestore = async (planIds = ['1year_revised']) => {
                if (!db || !SUPABASE_FUNCTION_URL) {
                    alert('설정 오류');
                    return { success: 0, error: 0, failedItems: [] };
                }
                
                let totalSuccess = 0;
                let totalError = 0;
                const failedItems = [];
                
                for (const planId of planIds) {
                    const [planType, version] = planId.split('_');
                    const versionInfo = BIBLE_VERSIONS[planType]?.find(v => v.id === version);
                    const targetTag = versionInfo?.tagName || '개역개정 일년일독';
                    const versionName = versionInfo?.name || planId;
                    
                    setSyncProgress({ 
                        current: 0, 
                        total: 365, 
                        success: 0, 
                        error: 0,
                        currentVersion: versionName,
                        currentDay: 0,
                        status: '📥 노션에서 목록 가져오는 중...'
                    });
                    
                    try {
                        // 1단계: Bulk로 모든 페이지 메타데이터 가져오기
                        console.log(`📥 ${versionName} 목록 가져오는 중...`);
                        const bulkResponse = await fetch(SUPABASE_BULK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tag: targetTag, includeContent: false })
                        });
                        
                        if (!bulkResponse.ok) {
                            throw new Error(`Bulk API Error: ${bulkResponse.status}`);
                        }
                        
                        const bulkData = await bulkResponse.json();
                        console.log(`✅ ${bulkData.count}개 페이지 목록 수신`);
                        
                        if (!bulkData.items || bulkData.items.length === 0) {
                            throw new Error('노션에서 가져온 데이터가 없습니다');
                        }
                        
                        // 날짜 → Day 번호 맵
                        const dateToDay = {};
                        for (let day = 1; day <= 365; day++) {
                            const targetDate = new Date(2025, 0, day);
                            const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
                            const dd = String(targetDate.getDate()).padStart(2, '0');
                            dateToDay[`${mm}-${dd}`] = day;
                        }
                        
                        // 2단계: 각 페이지의 본문 가져와서 저장
                        const items = bulkData.items;
                        let processed = 0;
                        
                        for (const item of items) {
                            const day = dateToDay[item.date];
                            if (!day) {
                                console.log(`⚠️ 날짜 매핑 실패: ${item.date}`);
                                totalError++;
                                failedItems.push({
                                    planId, versionName, day: 0, date: item.date,
                                    error: '날짜 매핑 실패'
                                });
                                continue;
                            }
                            
                            try {
                                // pageId로 직접 본문 가져오기 (DB 쿼리 없이!)
                                const pageResponse = await fetch(SUPABASE_PAGE_URL, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ pageId: item.pageId })
                                });
                                
                                if (!pageResponse.ok) throw new Error(`Page API Error: ${pageResponse.status}`);
                                const pageData = await pageResponse.json();
                                
                                if (pageData.text) {
                                    // Firestore에 저장
                                    // ★ pageId 저장 (오디오 실시간 로드용)
                                    const cacheKey = `${planType}_${version}_${day}`;
                                    await db.collection('verses').doc(cacheKey).set({
                                        title: item.title,
                                        text: pageData.text,
                                        pageId: item.pageId,  // ★ pageId 저장!
                                        day: day,
                                        planId: planId,
                                        syncedAt: firebase.firestore.FieldValue.serverTimestamp()
                                    });
                                    totalSuccess++;
                                    console.log(`✅ Day ${day} (${item.date}) 저장 완료`);
                                } else {
                                    throw new Error('본문 없음');
                                }
                                
                            } catch (e) {
                                totalError++;
                                failedItems.push({
                                    planId, versionName, day, date: item.date,
                                    error: e.message
                                });
                                console.error(`❌ Day ${day} 실패:`, e.message);
                            }
                            
                            processed++;
                            
                            // 진행 상황 업데이트 (5개마다)
                            if (processed % 5 === 0) {
                                setSyncProgress({ 
                                    current: processed, 
                                    total: items.length, 
                                    success: totalSuccess, 
                                    error: totalError,
                                    currentVersion: versionName,
                                    currentDay: day,
                                    status: `📝 본문 저장 중... (${processed}/${items.length})`
                                });
                            }
                            
                            // API 부하 방지 (200ms)
                            await new Promise(r => setTimeout(r, 200));
                        }
                        
                    } catch (e) {
                        console.error(`❌ ${versionName} 동기화 실패:`, e);
                        totalError += 365;
                        failedItems.push({
                            planId, versionName, day: 0, date: '',
                            error: `전체 실패: ${e.message}`
                        });
                    }
                }
                
                // 마지막 동기화 시간 저장
                await db.collection('settings').doc('sync').set({
                    lastSyncAt: firebase.firestore.FieldValue.serverTimestamp(),
                    successCount: totalSuccess,
                    errorCount: totalError,
                    syncedVersions: planIds,
                    failedItems: failedItems.slice(0, 50)
                });
                
                setSyncProgress(null);
                return { success: totalSuccess, error: totalError, failedItems };

            const handleRead = async () => {

                                </div>
                            </div>

                            <div className="relative w-full h-28 bg-map-texture overflow-hidden mt-0 border-t border-slate-200 bg-sky-texture">
                                <div className="mountain-back"></div>
                                <div className="mountain-front"></div>
                                <div className="absolute top-2 left-10 text-2xl opacity-80 animate-float">☁️</div>
                                <div className="absolute top-5 right-20 text-xl opacity-60 animate-float-slow">☁️</div>
                                <div className="absolute top-8 left-1/2 text-lg opacity-50 animate-float" style={{animationDelay: '2s'}}>☁️</div>
                                <div className="absolute bottom-2 left-5 text-sm z-10 opacity-90">🌸</div>
                                <div className="absolute bottom-3 right-10 text-sm z-10 opacity-90">🌼</div>
                                <div className="absolute bottom-4 left-1/3 text-xs z-10 opacity-80">🌱</div>

                                <div className="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col justify-center items-center z-20 group" style={{top: '60%'}}>
                                    <div className="relative">
                                        <div className="absolute inset-0 bg-yellow-400 rounded-full blur-xl opacity-70 animate-pulse"></div>
                                        <span className="text-5xl relative z-10 drop-shadow-2xl">🏰</span>
                                    </div>
                                    <span className="text-[9px] font-bold text-slate-600 bg-white/90 px-2 py-0.5 rounded-full mt-2 shadow-sm border border-slate-200 relative z-20">천국성</span>
                                </div>
                                
                                {(() => {
                                    // 나 주변 사람들만 표시 (앞 5명 + 나 + 뒤 5명)
                                    const myIndex = racers.findIndex(r => r.isMe);
                                    const startIdx = Math.max(0, myIndex - 5);
                                    const endIdx = Math.min(racers.length, myIndex + 6);
                                    const visibleRacers = racers.slice(startIdx, endIdx);
                                    
                                    return visibleRacers.map((racer, idx) => {
                                        const p = Math.min((racer.day / TOTAL_DAYS) * 100, 100);
                                        const isMe = racer.isMe;
                                        const racerLevel = getLevelInfo(racer.score || 0);
                                        return (
                                            <div key={racer.uid || idx} className="absolute transition-all duration-1000 ease-out flex flex-col items-center"
                                                style={{ left: `calc(${p}% - 16px)`, top: isMe ? '50%' : `${35+(idx%4)*12}%`, zIndex: isMe ? 50 : idx + 20 }}>
                                                <div className={`text-[9px] px-1.5 py-0.5 rounded-full mb-1 shadow-sm font-bold truncate max-w-[60px] ${isMe ? 'bg-blue-600 text-white' : 'bg-white/90 text-slate-500'}`}>{racer.name}</div>
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-lg shadow-md border-[3px] bg-white ${isMe ? 'border-blue-400' : 'border-white opacity-70'}`}>
                                                    {racerLevel.emoji}
                                                </div>
                                            </div>
                                        );
                                    });
                                })()}
                                <div className="absolute bottom-1 left-2 text-[10px] text-slate-500 bg-white/80 px-2 py-0.5 rounded z-30">전체 {racers.length}명 참가중</div>
                            </div>
                            
                            <div className="bg-white border-b border-slate-100 py-1 text-center">
                                <button onClick={() => setShowScoreInfo(true)} className="text-xs text-slate-500 flex items-center justify-center gap-1 mx-auto hover:text-blue-600">
                                    현재 나의 등급: <span className="font-bold text-slate-800">{myLevel.emoji} {myLevel.title}</span> (클릭하여 확인)
                                </button>
                            </div>
                        </header>

                        <main className="px-4 py-6 max-w-md mx-auto space-y-8">
                            {/* 광고/공지 배너 */}
                            {announcement && announcement.enabled && announcement.text && (
                                <div className="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-4 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <span className="text-2xl flex-shrink-0">📢</span>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{announcement.text}</p>
                                            {announcement.linkUrl && announcement.linkText && (
                                                <a 
                                                    href={announcement.linkUrl} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="inline-block mt-3 bg-amber-500 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-amber-600 transition-colors shadow-sm"
                                                >
                                                    {announcement.linkText} →
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                                <div className="p-6 text-white relative bg-gradient-to-br from-indigo-600 to-blue-700">
                                    <div className="absolute top-4 right-4 flex items-center gap-2">
                                        {(currentUser.readCount || 1) > 1 && (
                                            <div className="bg-purple-500/90 backdrop-blur-md text-white border border-purple-300/30 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                                                🏆 {currentUser.readCount}독 중
                                            </div>
                                        )}
                                        <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 text-xs font-bold px-3 py-1 rounded-full shadow-sm">🏁 완독 D-{daysRemaining}</div>
                                    </div>
                                    <h2 className="text-xl font-bold mb-1">{verseData.loading ? '로딩중...' : verseData.title}</h2>
                                    <p className="opacity-90 text-sm font-bold text-white/90 mb-2">{verseData.subtitle}</p>
                                    
                                    {/* 오디오 플레이어 (제목 바로 아래) */}
                                    {verseData.audioUrl && (
                                        <div className="mt-2 bg-white/10 backdrop-blur-md p-3 rounded-xl border border-white/20">
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="text-base">🎧</span>
                                                <span className="text-xs font-bold text-white/90">오디오로 듣기</span>
                                            </div>
                                            <audio controls className="w-full h-9" style={{borderRadius: '8px'}}>
                                                <source src={verseData.audioUrl} type="audio/mpeg" />
                                                브라우저가 오디오를 지원하지 않습니다.
                                            </audio>
                                        </div>
                                    )}
                                    
                                    <p className="opacity-80 text-xs mt-2">{getEncouragementMessage()}</p>
                                </div>
                                <div className="p-6">
                                    <div className={`mb-4 min-h-[100px] ${verseData.loading ? 'animate-pulse bg-slate-100 rounded' : ''}`}>
                                        {verseData.loading ? '' : <MarkdownRenderer content={verseData.text} />}
                                    </div>
                                    
                                    <button onClick={handleRead} disabled={verseData.loading} className="w-full text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95 disabled:opacity-50 bg-slate-900 shadow-blue-200">
                                        <Icon name="book" size={18}/><span>{hasReadToday ? '한 장 더 읽기 (미리 읽기)' : '오늘 말씀 읽기 완료'}</span>
                                    </button>
                                    
                                    {/* 묵상 메모 입력 */}
                                    <div className="mt-4 bg-purple-50 p-4 rounded-xl border border-purple-100">
                                        <div className="flex justify-between items-center mb-2">
                                            <h4 className="text-sm font-bold text-purple-700">✍️ 오늘의 묵상</h4>
                                            <button onClick={() => setShowMemoList(true)} className="text-xs text-purple-500 underline hover:text-purple-700">내 기록 보기</button>
                                        </div>
                                        <textarea 
                                            value={currentMemo}
                                            onChange={(e) => setCurrentMemo(e.target.value)}
                                            placeholder={`오늘 말씀에서 느낀 점을 적어보세요...\n\n• 마음에 와닿은 구절\n• 삶에 적용할 점\n• 기도 제목`}
                                            className="w-full p-3 text-sm border border-purple-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none bg-white"
                                            rows={8}
                                        />
                                        <button 
                                            onClick={() => saveMemo(currentDay - 1, currentMemo)}
                                            disabled={!currentMemo.trim()}
                                            className="w-full mt-2 bg-purple-600 text-white font-bold py-2 rounded-lg text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-purple-700 transition-colors"
                                        >
                                            💾 묵상 저장하기
                                        </button>
                                        {memos[currentDay - 1] && (
                                            <div className="mt-3 p-3 bg-white rounded-lg border border-purple-100 max-h-40 overflow-y-auto">
                                                <p className="text-[10px] text-purple-500 mb-2 font-bold">
                                                    이전에 저장한 묵상 ({memos[currentDay - 1].texts?.length || 1}개):
                                                </p>
                                                {(memos[currentDay - 1].texts || [memos[currentDay - 1].text]).map((text, idx) => (
                                                    <div key={idx} className={`text-sm text-slate-600 whitespace-pre-wrap leading-relaxed ${idx > 0 ? 'mt-3 pt-3 border-t border-purple-100' : ''}`}>
                                                        {(memos[currentDay - 1].texts?.length || 0) > 1 && (
                                                            <span className="text-[10px] text-purple-400 font-bold">#{idx + 1} </span>
                                                        )}
                                                        {text}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* 설정 영역 */}
                                    <div className="mt-3 bg-slate-50 p-3 rounded-xl border border-slate-200">
                                        <div className="flex items-center justify-between gap-2">
                                            {/* 소그룹 변경 버튼 */}
                                            <button 
                                                onClick={() => setShowSubgroupChange(true)}
                                                className="flex-1 text-xs bg-indigo-100 text-indigo-600 px-3 py-2 rounded-lg font-bold hover:bg-indigo-200"
                                            >
                                                👥 소그룹 변경
                                            </button>
                                            {/* 재시작 버튼 (뒤쳐진 경우만) */}
                                            {isBehind && currentDay > 10 && (
                                                <button 
                                                    onClick={() => setShowRestartConfirm(true)}
                                                    className="flex-1 text-xs bg-slate-200 text-slate-600 px-3 py-2 rounded-lg font-bold hover:bg-slate-300"
                                                >
                                                    🔄 처음부터 다시
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-700 flex items-center"><Icon name="users" size={18} className="mr-2 text-indigo-500"/>{communityName} 소그룹 순위</h3>
                                    <span className="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded-full font-bold">오늘 기준</span>
                                </div>
                                <div className="space-y-4 max-h-[250px] overflow-y-auto pr-2 scrollbar-hide">
                                    {subgroupRanking.length > 0 ? subgroupRanking.map((group, idx) => {
                                        const isMyGroup = group.name === subgroupId;
                                        return (
                                            <div key={idx} className={`relative ${isMyGroup ? 'bg-blue-50 p-2 rounded-lg -mx-2' : ''}`}>
                                                <div className="flex justify-between text-xs mb-1">
                                                    <span className={`font-bold ${isMyGroup ? 'text-blue-600' : 'text-slate-600'}`}>{idx+1}위. {group.name} {isMyGroup && '(우리팀)'}</span>
                                                    <span className={`font-bold ${isMyGroup ? 'text-blue-600' : 'text-slate-400'}`}>{group.readCount}/{group.totalCount}명 ({group.rate}%)</span>
                                                </div>
                                                <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full transition-all duration-1000 ${isMyGroup ? 'bg-blue-500' : 'bg-slate-300'}`} style={{ width: `${group.rate}%` }}></div>
                                                </div>
                                            </div>
                                        )
                                    }) : <div className="text-center text-slate-400 py-4">아직 데이터가 없습니다.</div>}
                                </div>
                            </div>

                            {/* 완주자 명예의 전당 */}
                            {communityMembers.filter(u => u.currentDay >= 365).length > 0 && (
                                <div className="bg-gradient-to-br from-yellow-50 to-orange-50 rounded-2xl border border-yellow-200 p-5 shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-yellow-700 flex items-center">👑 완주자 명예의 전당</h3>
                                        <span className="text-[10px] bg-yellow-100 text-yellow-600 px-2 py-1 rounded-full font-bold">365일 완독</span>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {communityMembers.filter(u => u.currentDay >= 365).sort((a, b) => (b.score || 0) - (a.score || 0)).map((u, idx) => (
                                            <div key={u.uid} className={`flex items-center gap-2 px-3 py-2 rounded-full border ${idx === 0 ? 'bg-yellow-100 border-yellow-300' : idx === 1 ? 'bg-slate-100 border-slate-300' : idx === 2 ? 'bg-orange-100 border-orange-300' : 'bg-white border-slate-200'}`}>
                                                <span>{idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '🏅'}</span>
                                                <span className="text-sm font-bold text-slate-700">{u.name}</span>
                                                <span className="text-xs text-slate-400">{u.score}점</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 주간 MVP */}
                            {(() => {
                                const mvp = getWeeklyMVP();
                                if (!mvp || !mvp.streakMVP) return null;
                                return (
                                    <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl border border-blue-200 p-5 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-blue-700 flex items-center">⭐ 이번 주 MVP</h3>
                                            <span className="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">주간</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-white p-3 rounded-xl border border-blue-100 text-center">
                                                <div className="text-2xl mb-1">🔥</div>
                                                <p className="text-[10px] text-slate-500 mb-1">연속 읽기왕</p>
                                                <p className="font-bold text-slate-800">{mvp.streakMVP.name}</p>
                                                <p className="text-xs text-orange-500">{mvp.streakMVP.streak || 0}일 연속</p>
                                            </div>
                                            <div className="bg-white p-3 rounded-xl border border-blue-100 text-center">
                                                <div className="text-2xl mb-1">🏃</div>
                                                <p className="text-[10px] text-slate-500 mb-1">진행왕</p>
                                                <p className="font-bold text-slate-800">{mvp.progressMVP.name}</p>
                                                <p className="text-xs text-blue-500">DAY {mvp.progressMVP.currentDay || 1}</p>
                                            </div>
                                        </div>
                                        <div className="mt-3 text-center">
                                            <p className="text-[10px] text-slate-400">🏆 연속 읽기: 매일 꾸준히 읽은 사람 | 진행왕: 가장 앞서가는 사람</p>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* 월간 소그룹 대항전 */}
                            {(() => {
                                const contest = getMonthlyContest();
                                if (!contest || contest.length === 0) return null;
                                const monthName = new Date().toLocaleDateString('ko-KR', { month: 'long' });
                                return (
                                    <div className="bg-gradient-to-br from-red-50 to-pink-50 rounded-2xl border border-red-200 p-5 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-red-700 flex items-center">🏆 {monthName} 소그룹 대항전</h3>
                                            <span className="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded-full font-bold">월간</span>
                                        </div>
                                        <div className="space-y-2">
                                            {contest.slice(0, 3).map((group, idx) => {
                                                const isMyGroup = group.name === subgroupId;
                                                const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉';
                                                return (
                                                    <div key={group.name} className={`flex items-center gap-3 p-2 rounded-lg ${isMyGroup ? 'bg-red-100 border border-red-200' : 'bg-white'}`}>
                                                        <span className="text-xl">{medal}</span>
                                                        <div className="flex-1">
                                                            <div className="flex justify-between">
                                                                <span className={`text-sm font-bold ${isMyGroup ? 'text-red-700' : 'text-slate-700'}`}>{group.name} {isMyGroup && '(우리팀)'}</span>
                                                                <span className="text-sm font-bold text-slate-500">{group.rate}%</span>
                                                            </div>
                                                            <div className="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden mt-1">
                                                                <div className={`h-full rounded-full ${idx === 0 ? 'bg-yellow-400' : idx === 1 ? 'bg-slate-400' : 'bg-orange-400'}`} style={{ width: `${group.rate}%` }}></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-3 text-center">
                                            <p className="text-[10px] text-slate-400">📊 기준: 오늘 읽은 비율 (읽은 인원 / 전체 인원)</p>
                                        </div>
                                    </div>
                                );
                            })()}
                        </main>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
