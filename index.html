        const MarkdownRenderer = ({ content }) => {
            if (!content) return null;
            const lines = content.split('\n');
            return (
                <div className="space-y-1">
                    {lines.map((line, i) => {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('### ')) return <h3 key={i} className="text-base font-bold text-slate-800 mt-3 mb-1 border-b border-slate-200 pb-1">{trimmed.slice(4)}</h3>;
                        if (trimmed.startsWith('## ')) return <h2 key={i} className="text-lg font-bold text-slate-800 mt-4 mb-1">{trimmed.slice(3)}</h2>;
                        if (trimmed.startsWith('# ')) return <h1 key={i} className="text-xl font-bold text-slate-800 mt-4 mb-2">{trimmed.slice(2)}</h1>;
                        if (trimmed.startsWith('• ') || trimmed.startsWith('- ')) return <li key={i} className="list-disc list-inside ml-4 text-slate-700 text-base leading-normal">{trimmed.slice(2)}</li>;
                        if (/^\d+\.\s/.test(trimmed)) return <li key={i} className="list-decimal list-inside ml-4 text-slate-700 text-base leading-normal">{trimmed.replace(/^\d+\.\s/, '')}</li>;
                        if (trimmed.startsWith('> ')) return <blockquote key={i} className="border-l-4 border-blue-300 pl-3 italic text-slate-600 my-2 bg-slate-50 p-2 rounded text-base">{trimmed.slice(2)}</blockquote>;
                        if (trimmed === '') return <div key={i} className="h-1"></div>;
                        return <p key={i} className="text-slate-700 leading-normal text-base">{line}</p>;
                    })}

            const getLevelInfo = (score) => [...LEVEL_SYSTEM].reverse().find(l => score >= l.min) || LEVEL_SYSTEM[0];

            const loadCommunityMembers = async (communityId) => {
                if (!db || !communityId) return [];
                try {
                    const snap = await db.collection('users').where('communityId', '==', communityId).get();
                    const members = snap.docs.map(doc => userDocToState(doc));
                    setCommunityMembers(members);
                    return members;
                } catch (e) { console.error(e); return []; }
            };

            const calculateSubgroupStats = (members, communityId) => {
                const todayStr = new Date().toDateString();
                const comm = MOCK_COMMUNITIES.find(c => c.id === communityId);
                if (!comm) return {};
                const stats = {};
                comm.subgroups.forEach(sub => {
                    const subMembers = members.filter(m => m.subgroupId === sub);
                    const totalCount = subMembers.length;
                    const readTodayCount = subMembers.filter(m => m.lastReadDate === todayStr).length;
                    const rate = totalCount > 0 ? Math.round((readTodayCount / totalCount) * 100) : 0;
                    stats[sub] = { rate, readCount: readTodayCount, totalCount };
                });
                return stats;
            };

            const downloadCSV = () => {
                if (allUsers.length === 0) { alert("데이터가 없습니다."); return; }
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF이름,부서,소그룹,현재Day,총점수,연속일수,마지막읽은날,플랜ID\n";
                allUsers.forEach(u => {
                    csvContent += `${u.name},${u.communityName},${u.subgroupId},${u.currentDay},${u.score},${u.streak},${u.lastReadDate || '없음'},${u.planId || '1year_revised'}\r\n`;
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `성경통독_전체기록_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

                    try {
                        await db.collection('users').doc(uid).delete();
                        setAllUsers(prev => prev.filter(u => u.uid !== uid));
                        alert("삭제되었습니다.");
                    } catch (e) { console.error(e); alert("삭제 실패"); }
                }
            };

            const startEditUser = (user) => setEditingUser({ ...user });

            const saveEditUser = async () => {
                if (!editingUser) return;
                try {
                    await db.collection('users').doc(editingUser.uid).set({
                        communityId: editingUser.communityId, communityName: editingUser.communityName,
                        subgroupId: editingUser.subgroupId, planId: editingUser.planId,
                        currentDay: editingUser.currentDay, score: editingUser.score,
                        streak: editingUser.streak, lastReadDate: editingUser.lastReadDate || null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    }, { merge: true });
                    setAllUsers(prev => prev.map(u => u.uid === editingUser.uid ? editingUser : u));
                    setEditingUser(null); alert("수정되었습니다.");
                } catch (e) { console.error(e); alert("수정 실패"); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if(!loginName.trim() || !loginPw.trim()) { setErrorMsg("이름과 암호를 모두 입력해주세요."); return; }

                if (loginName === 'admin' && loginPw === '08283') {
                    try {
                        if (auth && !auth.currentUser) await auth.signInAnonymously();
                        const snap = await db.collection('users').get();
                        setAllUsers(snap.docs.map(doc => userDocToState(doc)));
                        setIsAdmin(true);
                        return;
                    } catch (err) { console.error(err); setErrorMsg('관리자 데이터 로딩 실패'); return; }
                }

                try {
                    const email = makePseudoEmail(loginName);
                    let cred = null;
                    try {
                        cred = await auth.signInWithEmailAndPassword(email, loginPw);
                    } catch (err) {
                        if (err?.code === 'auth/user-not-found' || err?.code === 'auth/invalid-login-credentials') {
                            try {
                                cred = await auth.createUserWithEmailAndPassword(email, loginPw);
                            } catch (signupErr) {
                                if (signupErr?.code === 'auth/email-already-in-use') { setErrorMsg("암호가 틀렸습니다."); }
                                else if (signupErr?.code === 'auth/weak-password') { setErrorMsg("암호는 6자리 이상이어야 합니다."); }
                                else { console.error(signupErr); setErrorMsg("로그인 실패(잠시 후 다시 시도)"); }
                                return;
                            }
                        } else if (err?.code === 'auth/wrong-password') { setErrorMsg("암호가 틀렸습니다."); return; }
                        else { console.error(err); setErrorMsg("로그인 실패(잠시 후 다시 시도)"); return; }
                    }

                    const uid = cred.user.uid;
                    const ref = db.collection('users').doc(uid);
                    const doc = await ref.get();

                    if (!doc.exists) {
                        const newUserBase = {
                            name: loginName.trim(), password: loginPw, startDate: new Date().toDateString(),

                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        };
                        await ref.set(newUserBase);
                        setTempUser({ ...newUserBase, uid });
                        setView('plan_type_select');
                        return;
                    }

                    const user = userDocToState(doc);
                    setCurrentUser(user);
                    setHasReadToday(user.lastReadDate === new Date().toDateString());

                    if (!user.communityId || !user.subgroupId) {
                        setTempUser(user);
                        setView('plan_type_select');
                    } else { setView('dashboard'); }

                if (!SUPABASE_FUNCTION_URL) return { title: null, text: "서버 연결 설정이 필요합니다." };
                const [planType, version] = (planId || '1year_revised').split('_');
                const targetTag = BIBLE_VERSIONS[planType]?.find(v => v.id === version)?.tagName || '개역개정 일년일독';
                const targetDate = new Date(2025, 0, currentDay); 
                const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
                const dd = String(targetDate.getDate()).padStart(2, '0');
                try {
                    const response = await fetch(SUPABASE_FUNCTION_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tag: targetTag, date: `${mm}-${dd}` })
                    });
                    if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                    const data = await response.json();
                    if (data.error) return { title: null, text: `[오류] ${data.error}` };
                    return { title: data.title, text: data.text };

                const closestChaserDistance = communityMembers.filter(r => r.uid !== currentUser.uid && r.currentDay < currentDay).reduce((minDist, r) => Math.min(minDist, currentDay - r.currentDay), Infinity);
                const isPanic = closestChaserDistance <= PANIC_DISTANCE && closestChaserDistance !== Infinity;
                const daysRemaining = Math.max(0, TOTAL_DAYS - currentDay);
                const racers = communityMembers.map(m => ({ ...m, day: m.currentDay, isMe: m.uid === currentUser.uid, isPanic: m.uid === currentUser.uid && isPanic })).sort((a, b) => a.day - b.day);
                const subgroupRanking = getSubgroupRanking();
                const topGroups = subgroupRanking.slice(0, 3);
                const myGroupStats = subgroupRanking.find(r => r.name === subgroupId) || { name: subgroupId, rate: 0, readCount: 0, totalCount: 0 };
                const isMyGroupInTop3 = topGroups.some(g => g.name === subgroupId);

                return (
                    <div className="min-h-screen bg-slate-50 pb-20 overflow-hidden relative font-sans">
                        {showConfetti && <div className="fixed inset-0 z-50 flex justify-center pt-40 pointer-events-none"><div className="text-6xl animate-bounce">🎊</div></div>}
                        
                        {levelUpToast && (
                            <div className="fixed top-20 left-4 right-4 z-50 animate-bounce">
                                <div className="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3">
                                    <div className="text-3xl">{levelUpToast.emoji}</div>
                                    <div><p className="text-xs text-yellow-400 font-bold">LEVEL UP!</p><p className="font-bold">{levelUpToast.title}(으)로 승급!</p></div>
                                </div>
                            </div>
                        )}

                        {bonusToast && (
                            <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-50">
                                <div className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-2 font-bold whitespace-nowrap">
                                    <span>기본 10점</span><span>+</span><span>연속보너스 {bonusToast.streak}점</span><span>=</span><span className="text-yellow-300">총 {bonusToast.total}점!</span>
                                </div>
                            </div>
                        )}

                        {showScoreInfo && (
                            <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onClick={() => setShowScoreInfo(false)}>
                                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h3 className="text-xl font-bold">💡 점수 & 계급 안내</h3>
                                        <button onClick={() => setShowScoreInfo(false)} className="text-slate-400"><Icon name="close"/></button>
                                    </div>
                                    <div className="space-y-4 overflow-y-auto max-h-[60vh]">
                                        <div><h4 className="font-bold text-blue-600 mb-1">나의 등급</h4>
                                            <div className="flex items-center gap-3 bg-blue-50 p-3 rounded-xl border border-blue-100">
                                                <div className="text-3xl">{myLevel.emoji}</div>
                                                <div><div className="font-bold text-lg">{myLevel.title}</div><div className="text-xs text-slate-500">현재 {score}점</div></div>
                                            </div>
                                        </div>
                                        <div><h4 className="font-bold text-slate-700 mb-1">점수 모으는 법</h4>
                                            <ul className="text-sm text-slate-600 space-y-1 list-disc pl-4">
                                                <li>매일 읽기 완료: <strong>+10점</strong></li>
                                                <li>연속 읽기 보너스: <strong>매일 +1점씩 증가 (최대 +5점)</strong></li>
                                            </ul>
                                        </div>
                                        <div><h4 className="font-bold text-slate-700 mb-1">천로역정 계급표</h4>
                                            <div className="grid gap-2 text-sm">
                                                {LEVEL_SYSTEM.map((lvl, idx) => (
                                                    <div key={idx} className={`flex items-center gap-2 p-2 rounded ${lvl.title === myLevel.title ? 'bg-yellow-50 border border-yellow-200' : ''}`}>
                                                        <span className="text-xl">{lvl.emoji}</span><span className="flex-1">{lvl.title}</span><span className="text-slate-400 text-xs">{lvl.min}pt~</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowScoreInfo(false)} className="w-full bg-slate-100 font-bold py-3 rounded-xl mt-4 text-slate-600">닫기</button>
                                </div>
                            </div>
                        )}

                        {showReadingGuide && (
                            <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onClick={() => setShowReadingGuide(false)}>
                                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h3 className="text-xl font-bold text-slate-800">📖 성경통독 114 가이드</h3>
                                        <button onClick={() => setShowReadingGuide(false)} className="text-slate-400"><Icon name="close"/></button>
                                    </div>
                                    <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                        <h4 className="font-bold text-blue-700 mb-1">💡 성경통독 114란?</h4>
                                        <p className="text-xs"><strong>1년 1독 4회 효과!</strong><br/>3개월마다 성경 전체 시대를 볼 수 있도록 구성되어 있습니다.</p>
                                    </div>
                                    <button onClick={() => setShowReadingGuide(false)} className="w-full bg-slate-100 font-bold py-3 rounded-xl mt-4 text-slate-600">닫기</button>
                                </div>
                            </div>
                        )}

                        <div className="bg-slate-900 text-slate-300 text-[10px] py-1 px-4 flex justify-between items-center">
                            <span>현재 버전: <strong>{planTypeName} - {versionName}</strong></span>
                            <button onClick={handleChangeVersionStart} className="flex items-center gap-1 hover:text-white"><Icon name="refresh" size={10} /> 읽는 버전 바꾸기</button>
                        </div>

                        <header className="bg-white shadow-sm border-b border-slate-100 pb-2 sticky top-0 z-30">
                            <div className="px-4 py-2 flex justify-between items-center border-b border-slate-50">
                                <button onClick={handleLogout} className="text-xs font-bold text-slate-400 flex items-center hover:text-slate-600"><Icon name="back" size={12} className="mr-1"/> 로그아웃</button>
                                <div className="flex items-center gap-2">
                                    <div className={`text-xs font-bold px-2 py-1 rounded-lg flex items-center gap-1 ${streak > 0 ? 'bg-orange-50 text-orange-600' : 'bg-slate-100 text-slate-400'}`}>
                                        <Icon name="flame" size={12}/>{streak}일
                                    </div>
                                    <button onClick={() => setShowScoreInfo(true)} className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg flex items-center gap-1 hover:bg-blue-100">
                                        {myLevel.emoji} {score || 0}pt <span className="bg-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] border border-blue-200">?</span>
                                    </button>
                                    <button onClick={() => setShowReadingGuide(true)} className="text-xs font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded-lg hover:bg-slate-200">
                                        <Icon name="helpbook" size={14} className="text-slate-500"/>
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-50 px-4 py-4 border-b border-slate-200">
                                <div className="flex justify-between items-end mb-3">
                                    <span className="text-sm font-bold text-slate-700 flex items-center gap-1">🏆 {communityName} 실시간 랭킹</span>
                                    <span className="text-[10px] text-slate-400 shrink-0">오늘 읽은 비율</span>
                                </div>
                                <div className="space-y-3">
                                    {topGroups.map((group, idx) => {
                                        const isMyGroup = group.name === subgroupId;
                                        const rankColor = idx === 0 ? 'bg-yellow-100 text-yellow-700 border-yellow-200' : idx === 1 ? 'bg-slate-200 text-slate-700 border-slate-300' : 'bg-orange-100 text-orange-700 border-orange-200';
                                        const barColor = idx === 0 ? 'bg-yellow-400' : idx === 1 ? 'bg-slate-400' : 'bg-orange-400';
                                        return (
                                            <div key={idx} className="flex items-center gap-3">
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border shrink-0 ${rankColor}`}>{idx + 1}</div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex justify-between text-[10px] mb-1">
                                                        <span className={`font-bold truncate pr-2 ${isMyGroup ? 'text-blue-600' : 'text-slate-600'}`}>{group.name} {isMyGroup && '(나)'}</span>
                                                        <span className="font-bold text-slate-500 shrink-0">{group.readCount}/{group.totalCount}명 ({group.rate}%)</span>
                                                    </div>
                                                    <div className="h-3 w-full bg-white rounded-full overflow-hidden border border-slate-100">
                                                        <div className={`h-full rounded-full ${barColor}`} style={{ width: `${group.rate}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {!isMyGroupInTop3 && myGroupStats && (
                                        <div className="flex items-center gap-3 mt-2 pt-2 border-t border-slate-200 border-dashed">
                                            <div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold bg-blue-100 text-blue-700 border border-blue-200 shrink-0">?</div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between text-[10px] mb-1">
                                                    <span className="font-bold text-blue-600 truncate pr-2">{myGroupStats.name} (나)</span>
                                                    <span className="font-bold text-slate-500 shrink-0">{myGroupStats.readCount}/{myGroupStats.totalCount}명 ({myGroupStats.rate}%)</span>
                                                </div>
                                                <div className="h-3 w-full bg-white rounded-full overflow-hidden border border-slate-100">
                                                    <div className="h-full rounded-full bg-blue-500" style={{ width: `${myGroupStats.rate}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="relative w-full h-28 bg-map-texture overflow-hidden mt-0 border-t border-slate-200 bg-sky-texture">
                                <div className="mountain-back"></div>
                                <div className="mountain-front"></div>
                                <div className="absolute top-2 left-10 text-2xl opacity-80 animate-float">☁️</div>
                                <div className="absolute top-5 right-20 text-xl opacity-60 animate-float-slow">☁️</div>
                                <div className="absolute top-8 left-1/2 text-lg opacity-50 animate-float" style={{animationDelay: '2s'}}>☁️</div>
                                <div className="absolute bottom-2 left-5 text-sm z-10 opacity-90">🌸</div>
                                <div className="absolute bottom-3 right-10 text-sm z-10 opacity-90">🌼</div>
                                <div className="absolute bottom-4 left-1/3 text-xs z-10 opacity-80">🌱</div>

                                <div className="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col justify-center items-center z-20 group" style={{top: '60%'}}>
                                    <div className="relative">
                                        <div className="absolute inset-0 bg-yellow-400 rounded-full blur-xl opacity-70 animate-pulse"></div>
                                        <span className="text-5xl relative z-10 drop-shadow-2xl">🏰</span>
                                    </div>
                                    <span className="text-[9px] font-bold text-slate-600 bg-white/90 px-2 py-0.5 rounded-full mt-2 shadow-sm border border-slate-200 relative z-20">천국성</span>
                                </div>
                                
                                {(() => {
                                    // 나 주변 사람들만 표시 (앞 5명 + 나 + 뒤 5명)
                                    const myIndex = racers.findIndex(r => r.isMe);
                                    const startIdx = Math.max(0, myIndex - 5);
                                    const endIdx = Math.min(racers.length, myIndex + 6);
                                    const visibleRacers = racers.slice(startIdx, endIdx);
                                    
                                    return visibleRacers.map((racer, idx) => {
                                        const p = Math.min((racer.day / TOTAL_DAYS) * 100, 100);
                                        const isMe = racer.isMe;
                                        const racerLevel = getLevelInfo(racer.score || 0);
                                        return (
                                            <div key={racer.uid || idx} className="absolute transition-all duration-1000 ease-out flex flex-col items-center"
                                                style={{ left: `calc(${p}% - 16px)`, top: isMe ? '50%' : `${35+(idx%4)*12}%`, zIndex: isMe ? 50 : idx + 20 }}>
                                                <div className={`text-[9px] px-1.5 py-0.5 rounded-full mb-1 shadow-sm font-bold truncate max-w-[60px] ${isMe ? 'bg-blue-600 text-white' : 'bg-white/90 text-slate-500'}`}>{racer.name}</div>
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-lg shadow-md border-[3px] bg-white ${isMe ? `border-blue-400 ${racer.isPanic ? 'animate-wiggle':''}` : 'border-white opacity-70'}`}>
                                                    {racer.isPanic && isMe ? '😱' : racerLevel.emoji}
                                                    {racer.isPanic && isMe && <span className="absolute -top-1 -right-1 text-sm animate-ping">💦</span>}
                                                </div>
                                            </div>
                                        );
                                    });
                                })()}
                                <div className="absolute bottom-1 left-2 text-[10px] text-slate-500 bg-white/80 px-2 py-0.5 rounded z-30">전체 {racers.length}명 참가중</div>
                            </div>
                            
                            <div className="bg-white border-b border-slate-100 py-1 text-center">
                                <button onClick={() => setShowScoreInfo(true)} className="text-xs text-slate-500 flex items-center justify-center gap-1 mx-auto hover:text-blue-600">
                                    현재 나의 등급: <span className="font-bold text-slate-800">{myLevel.emoji} {myLevel.title}</span> (클릭하여 확인)
                                </button>
                            </div>
                        </header>

                        <main className="px-4 py-6 max-w-md mx-auto space-y-8">
                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                                <div className={`p-6 text-white relative ${isPanic ? 'bg-gradient-to-br from-red-500 to-orange-600' : 'bg-gradient-to-br from-indigo-600 to-blue-700'}`}>
                                    <div className="absolute top-4 right-4 bg-white/20 backdrop-blur-md text-white border border-white/30 text-xs font-bold px-3 py-1 rounded-full shadow-sm">🏁 완독 D-{daysRemaining}</div>
                                    <h2 className="text-xl font-bold mb-1">{verseData.loading ? '로딩중...' : verseData.title}</h2>
                                    <p className="opacity-90 text-sm font-bold text-white/90 mb-2">{verseData.subtitle}</p>
                                    <p className="opacity-80 text-xs">{isPanic ? '😱 쫓아오고 있어요! 어서 읽으세요!' : `${currentUser.name}님, 오늘도 힘내세요!`}</p>
                                </div>
                                <div className="p-6">
                                    <div className={`mb-8 min-h-[100px] ${verseData.loading ? 'animate-pulse bg-slate-100 rounded' : ''}`}>
                                        {verseData.loading ? '' : <MarkdownRenderer content={verseData.text} />}
                                    </div>
                                    <button onClick={handleRead} disabled={verseData.loading} className={`w-full text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95 disabled:opacity-50 ${isPanic ? 'bg-red-600 shadow-red-200' : 'bg-slate-900 shadow-blue-200'}`}>
                                        <Icon name="book" size={18}/><span>{hasReadToday ? '한 장 더 읽기 (미리 읽기)' : '오늘 말씀 읽기 완료'}</span>
                                    </button>
                                    <div className="mt-4 bg-yellow-50 p-3 rounded-xl border border-yellow-100 text-center">
                                        <p className="text-xs text-yellow-700 font-bold">💡 바빠서 못 읽으셨나요? <br/>주일에 밀린 말씀을 몰아서 읽어도 괜찮습니다!</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-700 flex items-center"><Icon name="users" size={18} className="mr-2 text-indigo-500"/>{communityName} 소그룹 순위</h3>
                                    <span className="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded-full font-bold">오늘 기준</span>
                                </div>
                                <div className="space-y-4 max-h-[250px] overflow-y-auto pr-2 scrollbar-hide">
                                    {subgroupRanking.length > 0 ? subgroupRanking.map((group, idx) => {
                                        const isMyGroup = group.name === subgroupId;
                                        return (
                                            <div key={idx} className={`relative ${isMyGroup ? 'bg-blue-50 p-2 rounded-lg -mx-2' : ''}`}>
                                                <div className="flex justify-between text-xs mb-1">
                                                    <span className={`font-bold ${isMyGroup ? 'text-blue-600' : 'text-slate-600'}`}>{idx+1}위. {group.name} {isMyGroup && '(우리팀)'}</span>
                                                    <span className={`font-bold ${isMyGroup ? 'text-blue-600' : 'text-slate-400'}`}>{group.readCount}/{group.totalCount}명 ({group.rate}%)</span>
                                                </div>
                                                <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full transition-all duration-1000 ${isMyGroup ? 'bg-blue-500' : 'bg-slate-300'}`} style={{ width: `${group.rate}%` }}></div>
                                                </div>
                                            </div>
                                        )
                                    }) : <div className="text-center text-slate-400 py-4">아직 데이터가 없습니다.</div>}
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
